<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yi Liu</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SVG liquid filter (hidden) -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
    <defs>
      <filter id="liquid" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence
          id="liq-turb"
          type="turbulence"
          baseFrequency="0 0"
          numOctaves="3"
          seed="4"
          result="turb" />
        <feDisplacementMap
          id="liq-disp"
          in="SourceGraphic"
          in2="turb"
          scale="0"
          xChannelSelector="R"
          yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <!-- Language toggle -->
  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="en">EN</button>
    <span class="lang-sep">|</span>
    <button class="lang-btn" data-lang="zh">中文</button>
  </div>

  <!-- Main landing page -->
  <div class="landing" id="landing">

    <!-- Left: intro (unchanged) -->
    <div class="left-panel">
      <div class="greeting">
        <p class="hi-text">Hi!</p>
        <p class="name-text">I am <span class="name-highlight">Yi Liu</span>!</p>
      </div>
      <div class="photo-circle">
        <div class="photo-ring"></div>
        <div class="photo-inner">
          <img src="photo.jpg" alt="Yi Liu" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
          <div class="photo-placeholder">YL</div>
        </div>
      </div>
    </div>

    <!-- Right: navigation sections -->
    <div class="right-panel" id="right-panel">
      <nav class="section-nav" id="section-nav">
        <!-- Row 1: About -->
        <div class="nav-row nav-row-1">
          <a class="nav-item" href="about.html" data-index="0">
            <span class="nav-text" data-en="About" data-zh="关于">About</span>
          </a>
        </div>
        <!-- Row 2: Research  Work -->
        <div class="nav-row nav-row-2">
          <a class="nav-item" href="research.html" data-index="1">
            <span class="nav-text" data-en="Research" data-zh="科研">Research</span>
          </a>
          <a class="nav-item" href="work.html" data-index="2">
            <span class="nav-text" data-en="Work" data-zh="工作">Work</span>
          </a>
        </div>
        <!-- Row 3: Education  Art Work  Contact -->
        <div class="nav-row nav-row-3">
          <a class="nav-item" href="education.html" data-index="3">
            <span class="nav-text" data-en="Education" data-zh="教育">Education</span>
          </a>
          <a class="nav-item" href="artwork.html" data-index="4">
            <span class="nav-text" data-en="Art Work" data-zh="艺术">Art Work</span>
          </a>
          <a class="nav-item" href="contact.html" data-index="5">
            <span class="nav-text" data-en="Contact" data-zh="联系">Contact</span>
          </a>
        </div>
      </nav>
    </div>

  </div>

  <!-- Ink splash overlay for page transitions -->
  <div class="ink-splash" id="ink-splash"></div>

  <script src="script.js"></script>
</body>
</html>
